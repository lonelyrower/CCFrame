<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>离线模式 | CC Frame</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0f172a;
        color: #f8fafc;
        padding: 24px;
        text-align: center;
      }
      .card {
        background: rgba(15, 23, 42, 0.75);
        border: 1px solid rgba(148, 163, 184, 0.35);
        border-radius: 16px;
        padding: 32px 28px;
        max-width: 420px;
        box-shadow: 0 24px 60px rgba(15, 15, 30, 0.55);
      }
      h1 {
        font-size: 1.75rem;
        margin-bottom: 0.75rem;
      }
      p {
        font-size: 1rem;
        line-height: 1.7;
        margin: 0;
        opacity: 0.85;
      }
      a {
        color: #f472b6;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>离线状态</h1>
      <p>当前网络不可用，已切换至离线模式。请在恢复联网后刷新页面，继续浏览相册和管理内容。</p>
    </main>
  </body>
</html>

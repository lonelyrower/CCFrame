
services:
  web:
    build: .
    container_name: ccframe-web
    restart: unless-stopped
    ports:
      - "3000:3000"  # 暴露端口以便调试
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      PIXABAY_API_KEY: ${PIXABAY_API_KEY}
      DEV_SEED_TOKEN: ${DEV_SEED_TOKEN}
      # Redis / S3
      REDIS_URL: redis://redis:6379
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      S3_REGION: ${S3_REGION}
      S3_ENDPOINT: http://minio:9000
      CDN_BASE_URL: ${CDN_BASE_URL}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    command: >
      sh -c "
      echo 'Starting web service...' &&
      for i in $(seq 1 30); do npx prisma db push && break || (echo 'DB not ready, retry...' && sleep 2); done &&
      node scripts/create-admin.js || true &&
      echo 'Starting Next.js server on port 3000...' &&
      npm run start
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - ccframe

  worker:
    build: .
    container_name: ccframe-worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      REDIS_URL: redis://redis:6379
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      S3_REGION: ${S3_REGION}
      S3_ENDPOINT: http://minio:9000
      START_WORKERS: 'true'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    command: >
      sh -c "
      for i in $(seq 1 30); do npx prisma db push && break || (echo 'DB not ready, retry...' && sleep 2); done &&
      npx tsx ./jobs/worker.ts
      "
    networks:
      - ccframe

  db:
    image: postgres:15-alpine
    container_name: ccframe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ccframe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ccframe}
      POSTGRES_DB: ${POSTGRES_DB:-ccframe}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - ccframe
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ccframe} -d ${POSTGRES_DB:-ccframe}"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: ccframe-redis
    restart: unless-stopped
    networks:
      - ccframe

  minio:
    image: minio/minio:latest
    container_name: ccframe-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio:/data
    networks:
      - ccframe

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-ccframe}
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "sleep 15 && 
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD && 
      mc mb -p local/ccframe || true && 
      mc mb -p local/photo-gallery || true && 
      echo 'MinIO buckets created'"
    networks:
      - ccframe

  nginx:
    image: nginx:1.25-alpine
    container_name: ccframe-nginx
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - ccframe
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/nginx-health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
  minio:

networks:
  ccframe:
    driver: bridge

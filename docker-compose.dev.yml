version: "3.9"
services:
  db:
    image: postgres:15-alpine
    container_name: ccframe-dev-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: photo_gallery
    volumes:
      - dev_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d photo_gallery"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: ccframe-dev-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  dev_pgdata:

networks:
  default:
    name: ccframe-dev